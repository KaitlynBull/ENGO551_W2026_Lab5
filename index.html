<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ENGO 551 - IOT Geoweb App</title>
        
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script> 
        
    </head>
    <body>
        <h2>IOT Geoweb Application</h2>
        <div class="panel">
            <div class="form-group">
                <label for="hostInput">MQTT Host</label>
                <input type="text" id="hostInput" value="test.mosquitto.org">
            </div>
            <div class="form-group">
                <label for="portInput">Port:</label>
                <input type="number" id="portInput" value="8080">
            </div>

            <div class="form-group">
                <button id="btn-start">Start Connection</button>
                <button id="btn-end" disabled>End Connection</button>
            </div>
            <div id="status-message">Status: Disconnected</div>

            <button id="btn-share" disabled>Share My Status</button>
        </div>

        <div id="map"></div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
            // initalizing map
            const map = L.map('map').setView([51.0447, -114.0719], 10)
            // Adding the OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            let userMarker; // variable for user marker

            // function to define the color of the marker based on temp
            function getTemperatureColor(temp){
                if (temp >= -40 && temp < 10) {
                    return 'blue';
                } else if (temp >= 10 && temp < 30) {
                    return 'green';
                } else if (temp >= 30 && temp <= 60) {
                    return 'red';
                } else {
                    return 'gray'; // option if it doesn't fit into set bins
                }
            }

            // function to update or create the map marker
            function updateMarker(lab, long, temp){
                const color = getTemperatureColor(temp);

                // create marker if it doesn't exist
                if(!userMarker){
                    userMarker = L.circleMarker([lat, long],{
                        radius: 12,
                        fillColor: color,
                        color: '#000',
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map);
                }
                else{
                    // If marker does exist
                    userMarker.setLatLng([lat,long]);
                    userMarker.setStyle({ fillColor: color });
                }
                userMarker.bindPopup(`<b>Current Temperature:</b> ${temp}°C`).openPopup();
                map.panTo([lat,long])
            }




        </script>




    </body>
</html>
